<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design B — Playful Script</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body {
    font-family: 'Nunito', sans-serif;
    background: #ECE2D0;
    color: #3A2E2A;
    min-height: 100vh;
  }

  /* ── Wave Pattern ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.08;
    background: repeating-linear-gradient(
      45deg,
      #992E2E 0px, #992E2E 1px,
      transparent 1px, transparent 20px
    );
  }
  body::after {
    content: '';
    position: fixed; bottom: 0; left: 0; right: 0; height: 120px; z-index: 0; pointer-events: none; opacity: 0.06;
    background:
      radial-gradient(ellipse 80% 100% at 50% 100%, #99BCD7 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 30% 100%, #992E2E 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 70% 100%, #992E2E 0%, transparent 60%);
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 20px; }

  /* ── Header ── */
  .header {
    text-align: center; padding: 30px 0 20px;
    position: relative;
  }
  .header::after {
    content: '~ ~ ~';
    display: block; font-family: 'Caveat', cursive; font-size: 1.2rem;
    color: #99BCD7; letter-spacing: 8px; margin-top: 4px;
  }
  .header h1 {
    font-family: 'Caveat', cursive;
    font-size: 2.5rem; font-weight: 700; color: #992E2E;
    transform: rotate(-1deg);
  }
  .header span { font-size: 0.85rem; color: #8B7068; }

  /* ── Note Card ── */
  .note-card {
    background: linear-gradient(135deg, #FFFAF5 0%, #FDF6F3 100%);
    border-radius: 16px; padding: 18px 20px;
    box-shadow: 0 3px 16px rgba(153,46,46,0.06);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
    position: relative;
    animation: wobbleIn 0.5s ease;
    border: 1px solid rgba(229,217,200,0.6);
    transform: rotate(-0.3deg);
  }
  .note-card:nth-child(even) { transform: rotate(0.4deg); }
  @keyframes wobbleIn {
    0%   { opacity: 0; transform: rotate(-3deg) translateY(16px); }
    100% { opacity: 1; transform: rotate(-0.3deg) translateY(0); }
  }
  .note-card .scribble {
    position: absolute; top: -8px; left: 16px;
    width: 40px; height: 6px; border-radius: 3px;
    background: #99BCD7; opacity: 0.5;
  }
  .note-card .content { flex: 1; min-width: 0; }
  .note-card .english {
    font-family: 'Caveat', cursive; font-size: 1.5rem; font-weight: 600;
  }
  .note-card .chinese { font-size: 0.78rem; color: #8B7068; margin-top: 2px; }
  .note-card .badge {
    padding: 3px 10px; border-radius: 12px; font-size: 0.68rem; font-weight: 700;
    background: #EDF4F9; color: #99BCD7; white-space: nowrap;
  }

  /* ── Review Card ── */
  .review-card {
    background: linear-gradient(135deg, #FFFAF5, #FDF6F3);
    border-radius: 20px; padding: 36px 28px;
    box-shadow: 0 6px 24px rgba(153,46,46,0.08);
    text-align: center; min-height: 260px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; margin-bottom: 16px;
    animation: softDrop 0.5s ease;
    transform: rotate(-0.5deg);
    border: 1px solid rgba(229,217,200,0.6);
  }
  @keyframes softDrop {
    0%   { opacity: 0; transform: rotate(-3deg) translateY(-20px); }
    100% { opacity: 1; transform: rotate(-0.5deg) translateY(0); }
  }
  .review-card .word {
    font-family: 'Caveat', cursive; font-size: 2.4rem; font-weight: 700;
    line-height: 1.2;
  }
  .review-card .underline {
    width: 60px; height: 3px; background: #99BCD7; margin: 8px auto 16px;
    border-radius: 2px; opacity: 0.6;
  }
  .review-card .hint { font-size: 0.78rem; color: #BFABA0; margin-top: 8px; }
  .review-card .actions {
    display: flex; gap: 10px; margin-top: 20px; padding-top: 16px;
    border-top: 1px solid #E5D9C8;
  }
  .review-card .actions button {
    flex: 1; padding: 12px; border-radius: 14px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-outline {
    background: #FFFAF5; color: #992E2E; border: 2px solid #E5D9C8 !important;
  }
  .btn-primary {
    background: #992E2E; color: #fff;
  }
  .btn-primary:hover { background: #7A2525; transform: scale(1.02); }
  .btn-outline:hover { background: #F6ECEC; }

  /* ── Nav ── */
  .nav {
    display: flex; gap: 0; background: #FFFAF5;
    border-radius: 18px; padding: 6px; box-shadow: 0 2px 14px rgba(0,0,0,0.05);
    position: sticky; bottom: 20px;
  }
  .nav button {
    flex: 1; padding: 12px 6px; border: none; background: transparent;
    font-family: 'Nunito', sans-serif; font-size: 0.72rem; font-weight: 700;
    color: #8B7068; border-radius: 14px; cursor: pointer; transition: all 0.2s;
  }
  .nav button.active { background: #EDF4F9; color: #99BCD7; }

  .section-label {
    font-family: 'Caveat', cursive; font-size: 1.2rem;
    color: #99BCD7; margin: 20px 0 10px; padding-left: 4px;
  }

  .sparkle {
    display: inline-block; animation: twinkle 1.5s ease infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.3; transform: scale(0.8); }
    50%     { opacity: 1;   transform: scale(1.1); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span class="sparkle">~</span> SmartNote</h1>
    <span>learn at your own pace</span>
  </div>

  <div class="section-label">Browse  Cards</div>
  <div class="note-card">
    <div class="scribble"></div>
    <div class="content">
      <div class="english">serendipity</div>
      <div class="chinese">意外发现美好事物的能力</div>
    </div>
    <span class="badge">word</span>
  </div>
  <div class="note-card" style="animation-delay:0.08s">
    <div class="scribble"></div>
    <div class="content">
      <div class="english">take off</div>
      <div class="chinese">起飞；脱下</div>
    </div>
    <span class="badge">phrase</span>
  </div>

  <div class="section-label">Review  Card</div>
  <div class="review-card">
    <div class="word">serendipity</div>
    <div class="underline"></div>
    <div class="hint">tap the card to reveal</div>
    <div class="actions">
      <button class="btn-outline">Don't Remember</button>
      <button class="btn-primary">Remember</button>
    </div>
  </div>

  <div style="height:20px"></div>
  <div class="nav">
    <button class="active">Add</button>
    <button>Browse</button>
    <button>Review</button>
    <button>Stats</button>
    <button>Settings</button>
  </div>

  <p style="text-align:center;margin-top:24px;font-size:0.7rem;color:#BFABA0">
    Design B — Playful Script · Caveat + Nunito fonts · Wave pattern · Hand-drawn feel
  </p>
</div>
</body>
</html>
