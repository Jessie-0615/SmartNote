<!DOCTYPE html>
<html lang="zh-CN" data-theme="scheme-6" data-style="original">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E56A79">
  <meta name="description" content="AI-powered English learning with spaced repetition review">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartNote">

  <title>SmartNote — English Learning & Review</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet" media="none" onload="if(this.media!=='all')this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet"></noscript>

  <link rel="manifest" href="/manifest.json?v=7">
  <link rel="icon" href="/icons/icon.svg?v=7" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png?v=7">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <div id="app">
    <!-- Header (mobile only) -->
    <header class="app-header">
      <span class="app-header__title">EngNotes</span>
      <span id="headerSubtitle" class="text-secondary" style="font-size:var(--font-size-sm)"></span>
    </header>

    <!-- Content Area -->
    <main class="main-content" id="mainContent">
      <!-- Views are rendered here dynamically -->
    </main>

    <!-- Sidebar Navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="bottom-nav__item active" data-route="#/add" aria-label="Add Note">
        <span class="label">Add</span>
      </button>
      <button class="bottom-nav__item" data-route="#/browse" aria-label="Browse">
        <span class="label">Browse</span>
      </button>
      <button class="bottom-nav__item" data-route="#/review" aria-label="Review">
        <span class="label">Review</span>
      </button>
      <button class="bottom-nav__item" data-route="#/stats" aria-label="Statistics">
        <span class="label">Stats</span>
      </button>
      <button class="bottom-nav__item" data-route="#/settings" aria-label="Settings">
        <span class="label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <!-- JavaScript -->
  <script src="/js/utils.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/sm2.js"></script>
  <script src="/js/dict.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/sync.js"></script>
  <script src="/js/charts/chart.js"></script>
  <script src="/js/views/note-editor.js"></script>
  <script src="/js/views/note-detail.js"></script>
  <script src="/js/views/browse.js"></script>
  <script src="/js/views/review.js"></script>
  <script src="/js/views/stats.js"></script>
  <script src="/js/views/settings.js"></script>
  <script src="/js/pwa.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
